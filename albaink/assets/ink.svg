<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" role="img" aria-label="ink character">
  <!-- ALBA inK mascot: an ink drop named 'ink / 인코' -->
  <defs>
    <linearGradient id="inkBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#74C074"/>
      <stop offset="1" stop-color="#4FA04F"/>
    </linearGradient>
  </defs>
  <!-- left arm (waving) -->
  <path d="M44 150 C22 140 14 118 24 104 C30 122 44 128 58 132 Z" fill="#4FA04F" stroke="#2F5D32" stroke-width="5" stroke-linejoin="round"/>
  <!-- right arm -->
  <path d="M156 152 C176 150 186 134 182 120 C176 134 162 138 150 138 Z" fill="#4FA04F" stroke="#2F5D32" stroke-width="5" stroke-linejoin="round"/>
  <!-- body: ink drop (pointed top, round bottom) -->
  <path d="M100 14 C100 14 150 86 150 134 C150 176 128 206 100 206 C72 206 50 176 50 134 C50 86 100 14 100 14 Z"
        fill="url(#inkBody)" stroke="#2F5D32" stroke-width="6" stroke-linejoin="round"/>
  <!-- eyes -->
  <ellipse cx="82" cy="118" rx="15" ry="17" fill="#fff" stroke="#2F5D32" stroke-width="4"/>
  <ellipse cx="118" cy="118" rx="15" ry="17" fill="#fff" stroke="#2F5D32" stroke-width="4"/>
  <circle cx="85" cy="121" r="6.5" fill="#1f3a20"/>
  <circle cx="121" cy="121" r="6.5" fill="#1f3a20"/>
  <circle cx="82.5" cy="118" r="2.2" fill="#fff"/>
  <circle cx="118.5" cy="118" r="2.2" fill="#fff"/>
  <!-- smile -->
  <path d="M84 150 Q100 168 116 150 Q100 160 84 150 Z" fill="#1f3a20"/>
  <path d="M88 154 Q100 160 112 154" fill="#ff7a7a"/>
  <!-- 'ink' wordmark on belly -->
  <text x="100" y="190" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="26" font-weight="700" fill="#eaf7e8">ink</text>
  <!-- little legs -->
  <path d="M84 204 L84 218 M116 204 L116 218" stroke="#2F5D32" stroke-width="6" stroke-linecap="round"/>
</svg>
